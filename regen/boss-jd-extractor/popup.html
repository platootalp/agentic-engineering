<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boss直聘JD提取器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .header h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: #666;
    }
    
    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #00b578 0%, #00a870 100%);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 181, 120, 0.4);
    }
    
    .btn-secondary {
      background: #667eea;
      color: white;
    }
    
    .btn-secondary:hover:not(:disabled) {
      background: #5a6fd6;
      transform: translateY(-2px);
    }
    
    .btn-cancel {
      background: #fef0f0;
      color: #f56c6c;
      border: 1px solid #fde2e2;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .status-box {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin: 12px 0;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .status-idle {
      background: #f5f7fa;
      color: #909399;
    }
    
    .status-extracting {
      background: #e6f7ff;
      color: #1890ff;
      border: 1px solid #91d5ff;
    }
    
    .status-success {
      background: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }
    
    .status-error {
      background: #fff2f0;
      color: #ff4d4f;
      border: 1px solid #ffccc7;
    }
    
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e8e8e8;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b578, #00d68a);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    
    .result-info {
      margin-top: 12px;
      padding: 12px;
      background: #f6ffed;
      border-radius: 8px;
      border: 1px solid #b7eb8f;
    }
    
    .result-info h4 {
      font-size: 13px;
      color: #52c41a;
      margin-bottom: 8px;
    }
    
    .result-info p {
      font-size: 12px;
      color: #666;
      margin: 4px 0;
    }
    
    .hidden { display: none !important; }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 Boss直聘JD提取器</h1>
      <p>一键提取，自动下载Markdown</p>
    </div>
    
    <!-- Extract Button -->
    <button id="extractBtn" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      开始提取
    </button>
    
    <!-- Cancel Button (hidden by default) -->
    <button id="cancelBtn" class="btn btn-cancel hidden">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      取消提取
    </button>
    
    <!-- Download Button (hidden by default) -->
    <button id="downloadBtn" class="btn btn-secondary hidden">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      下载Markdown
    </button>
    
    <!-- Clear Data Button -->
    <button id="clearBtn" class="btn" style="background: #999; color: white; font-size: 12px; padding: 8px;">
      清除数据
    </button>
    
    <!-- Status Display -->
    <div id="statusBox" class="status-box status-idle">
      <span id="statusText">准备就绪，点击开始提取</span>
      <div id="progressBar" class="progress-bar hidden">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>
    
    <!-- Result Info (hidden by default) -->
    <div id="resultInfo" class="result-info hidden">
      <h4>✅ 提取完成</h4>
      <p id="resultDetails"></p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
